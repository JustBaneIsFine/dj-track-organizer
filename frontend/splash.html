<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DJ Organizer</title>
  <style>
    /* Self-contained: shown before the local server is up, so no external
       assets and no server dependency. Mirrors the app's default dark theme. */
    :root {
      --bg: #0e0e10;
      --text: #d4d4d4;
      --text-dim: #888;
      --accent: #00e0c8;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; height: 100%; width: 100%;
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
    }
    .wrap {
      height: 100%; width: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 22px;
      user-select: none;
    }
    .brand {
      font-size: 26px; font-weight: 700; letter-spacing: .4px;
      color: var(--accent);
    }
    .brand .dim { color: var(--text); font-weight: 600; }
    .spinner {
      width: 38px; height: 38px;
      border: 3px solid rgba(255,255,255,.10);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status { font-size: 12px; color: var(--text-dim); letter-spacing: .3px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">DJ&nbsp;<span class="dim">Organizer</span></div>
    <div class="spinner"></div>
    <div class="status">Starting up…</div>
  </div>
</body>
</html>
